<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki Expert - Offline</title>
<style>
:root { --bg: #f0f4ff; --card: #ffffff; --text: #111; --primary: #4a6cf7; --good: #d4edda; --warn: #fff3cd; --bad: #f8d7da; }
.dark { --bg: #1e1e1e; --card: #2c2c2c; --text: #f0f0f0; --primary: #5a7cf7; --good: #155724; --warn: #856404; --bad: #721c24; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
.app { width: 100%; max-width: 600px; min-height: 100vh; background: var(--card); border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.header { background: var(--primary); color: white; padding: 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; border-radius: 20px 20px 0 0; }
.content { padding: 20px; }
button { width: 100%; padding: 14px; margin: 5px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
.blue { background: var(--primary); color:white; }
.gray { background: #6c757d; color:white; }
input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ccc; margin: 5px 0; }
.hidden { display: none; }
.word { font-size: 28px; font-weight: bold; margin: 20px 0; text-align: center; }
.fb { padding: 12px; border-radius: 10px; margin: 10px 0; display: none; text-align: center; font-weight: bold; }
table { width:100%; border-collapse: collapse; font-size: 14px; }
td, th { border:1px solid #ccc; padding:8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div id="hTitle">🏠 Lobby</div>
    <button onclick="toggleTheme()" style="width:auto;">🌙/☀</button>
  </div>
  <div class="content">
    <!-- LOBBY -->
    <div id="lobby">
      <h3>Wybierz dziedzinę:</h3>
      <div id="lBtns"></div>
      <button onclick="addLang()" class="gray">+ Dodaj własny przedmiot</button>
    </div>
    <!-- MENU -->
    <div id="menu" class="hidden">
      <button class="gray" onclick="show('lobby')">⬅ Powrót do Lobby</button>
      <h2 id="mTitle"></h2>
      <button class="blue" onclick="drawTopics()">📚 Moje Zestawy</button>
      <button style="background:#ffc107;" onclick="showImp()">❗ Ważne Info</button>
    </div>
    <!-- TOPICS -->
    <div id="topics" class="hidden">
      <button class="gray" onclick="show('menu')">⬅ Menu</button>
      <div id="tList"></div>
      <hr>
      <input id="nTopic" placeholder="Nazwa nowego zestawu">
      <button class="blue" onclick="addTopic()">➕ Stwórz zestaw</button>
    </div>
    <!-- EDIT -->
    <div id="edit" class="hidden">
      <button class="gray" onclick="drawTopics()">⬅ Zestawy</button>
      <h3 id="eTitle"></h3>
      <div style="background:#eee; padding:10px; border-radius:15px; margin-bottom:15px;">
        <select id="wCount"><option value="5">5 słów</option><option value="10" selected>10 słów</option><option value="999">Wszystkie</option></select>
        <button class="blue" onclick="startG()">▶ START</button>
      </div>
      <h4>Dodaj nowe słowo:</h4>
      <input id="w1" placeholder="Pytanie (np. Apple)">
      <input id="w2" placeholder="Odpowiedź (np. Jabłko)">
      <button class="blue" onclick="addW()">➕ Dodaj do listy</button>
      <div id="wView" style="max-height:100px; overflow-y:auto; font-size:12px; margin-top:10px;"></div>
    </div>
    <!-- GAME -->
    <div id="game" class="hidden">
      <div id="fb" class="fb"></div>
      <div id="word" class="word"></div>
      <input id="ans" placeholder="Wpisz odpowiedź..." autocomplete="off">
      <button id="gBtn" class="blue" onclick="gAction()">SPRAWDŹ</button>
    </div>
    <!-- RESULT -->
    <div id="result" class="hidden">
      <h2 id="resT"></h2>
      <div id="errL"></div>
      <button class="blue" onclick="show('menu')">OK</button>
    </div>
    <!-- IMPORTANT -->
    <div id="imp" class="hidden">
      <button class="gray" onclick="show('menu')">⬅ Powrót</button>
      <div id="impC" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<script>
const initialData = {
  "Angielski": {
    "🍎 Owoce": [["Apple","Jabłko"],["Pear","Gruszka"],["Plum","Śliwka"]],
    "🎨 Kolory": [["Red","Czerwony"],["Blue","Niebieski"],["Green","Zielony"]],
    "🔢 Liczby": [["One","Jeden"],["Two","Dwa"],["Three","Trzy"]]
  },
  "Hiszpański": {
    "🍎 Owoce": [["Manzana","Jabłko"],["Uva","Winogrono"]],
    "💬 Podstawy": [["Hola","Cześć"],["Gracias","Dziękuję"]]
  },
  "Matematyka": {
    "⚡ Potęgi": [["2^2","4"],["3^2","9"],["5^2","25"]],
    "√ Pierwiastki": [["√16","4"],["√81","9"]]
  },
  "Geografia": {
    "🌍 Stolice Europy": [["Polska","Warszawa"],["Niemcy","Berlin"],["Francja","Paryż"],["Włochy","Rzym"]],
    "🏔 Szczyty": [["Mount Everest","Himalaje"],["Rysy","Tatry"]]
  }
};

let st = JSON.parse(localStorage.getItem("fiszki_v4")) || { custom: initialData, langs: Object.keys(initialData), kn: {}, theme: "light" };
let cur = { l: "", t: "", w: [], i: 0, ok: 0, err: [], wait: false };

function save() { localStorage.setItem("fiszki_v4", JSON.stringify(st)); }
function show(id) { document.querySelectorAll('.content > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

function drawLobby() {
  const d = document.getElementById('lBtns'); d.innerHTML = '';
  st.langs.forEach(l => {
    let b = document.createElement('button'); b.className = 'blue'; b.innerText = l;
    b.onclick = () => { cur.l = l; document.getElementById('mTitle').innerText = l; show('menu'); };
    d.appendChild(b);
  });
}

function addLang() { let n = prompt("Podaj nazwę przedmiotu:"); if(n) { st.langs.push(n); st.custom[n] = {}; save(); drawLobby(); } }

function drawTopics() {
  show('topics'); const d = document.getElementById('tList'); d.innerHTML = '';
  Object.keys(st.custom[cur.l] || {}).forEach(t => {
    let b = document.createElement('button'); b.innerText = `${t} (${st.custom[cur.l][t].length})`;
    b.onclick = () => { cur.t = t; drawEdit(); }; d.appendChild(b);
  });
}

function addTopic() {
  let n = document.getElementById('nTopic').value; if(!n) return;
  if(!st.custom[cur.l]) st.custom[cur.l] = {}; st.custom[cur.l][n] = [];
  save(); drawTopics(); document.getElementById('nTopic').value = '';
}

function drawEdit() {
  show('edit'); document.getElementById('eTitle').innerText = cur.t;
  const v = document.getElementById('wView');
  v.innerHTML = st.custom[cur.l][cur.t].map(x => `• ${x[0]} = ${x[1]}`).join('<br>');
}

function addW() {
  let v1 = document.getElementById('w1').value, v2 = document.getElementById('w2').value;
  if(!v1 || !v2) return; st.custom[cur.l][cur.t].push([v1, v2]);
  save(); drawEdit(); document.getElementById('w1').value = ''; document.getElementById('w2').value = '';
}

function startG() {
  let all = st.custom[cur.l][cur.t]; if(!all || all.length === 0) return;
  let n = parseInt(document.getElementById('wCount').value);
  cur.w = [...all].sort(() => 0.5 - Math.random()).slice(0, n);
  cur.i = 0; cur.ok = 0; cur.err = []; show('game'); nextW();
}

function nextW() {
  cur.wait = false; document.getElementById('fb').style.display='none'; document.getElementById('gBtn').innerText="SPRAWDŹ";
  if(cur.i >= cur.w.length) return fin();
  document.getElementById('word').innerText = cur.w[cur.i][0];
  document.getElementById('ans').value = ''; document.getElementById('ans').focus();
}

function gAction() {
  if(cur.wait) { cur.i++; nextW(); return; }
  let u = document.getElementById('ans').value.trim().toLowerCase();
  let r = cur.w[cur.i][1].toLowerCase();
  let f = document.getElementById('fb'); f.style.display='block'; cur.wait = true;
  document.getElementById('gBtn').innerText="DALEJ";
  
  if(u === r) { f.innerText="Super! ✔"; f.style.background="var(--good)"; cur.ok++; }
  else if (lev(u, r) <= 1) { f.innerText=`Literówka! Poprawnie: ${cur.w[cur.i][1]}`; f.style.background="var(--warn)"; cur.ok++; }
  else { f.innerText=`Błąd! Poprawnie: ${cur.w[cur.i][1]}`; f.style.background="var(--bad)"; cur.err.push(`${cur.w[cur.i][0]} -> ${cur.w[cur.i][1]}`); }
}

function fin() {
  show('result'); document.getElementById('resT').innerText = `Wynik: ${cur.ok}/${cur.w.length}`;
  document.getElementById('errL').innerHTML = cur.err.length ? "<b>Do powtórki:</b><br>" + cur.err.join('<br>') : "Perfekcyjnie! ✨";
}

function lev(s1, s2) {
  let costs = []; for(let i=0; i<=s1.length; i++) { let last=i; for(let j=0; j<=s2.length; j++) { if(i==0) costs[j]=j; else if(j>0) { let newV=costs[j-1]; if(s1[i-1]!=s2[j-1]) newV=Math.min(Math.min(newV,last),costs[j])+1; costs[j-1]=last; last=newV; } } if(i>0) costs[s2.length]=last; } return costs[s2.length];
}

function showImp() {
  show('imp'); let c = document.getElementById('impC');
  if(cur.l === "Geografia") c.innerHTML = "<table><tr><th>Kraj</th><th>Stolica</th></tr><tr><td>Niemcy</td><td>Berlin</td></tr><tr><td>Hiszpania</td><td>Madryt</td></tr></table>";
  else if(cur.l === "Matematyka") c.innerHTML = "<b>Wzór na potęgi:</b> a^n = a * a * ... (n razy)<br><b>Pierwiastki:</b> √81 = 9, bo 9*9=81";
  else c.innerHTML = "Pobierz zasady online lub dodaj własne notatki w kodzie.";
}

function toggleTheme() { document.body.classList.toggle("dark"); st.theme = document.body.classList.contains("dark") ? "dark" : "light"; save(); }
if(st.theme === "dark") document.body.classList.add("dark");
drawLobby();
</script>
</body>
</html>
