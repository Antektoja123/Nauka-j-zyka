<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki Expert PRO - System Powtórek</title>
<style>
:root { --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --primary: #0866ff; --good: #d1e7dd; --warn: #fff3cd; --bad: #f8d7da; }
.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --primary: #2d88ff; --good: #0f5132; --warn: #664d03; --bad: #842029; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
.app { width: 100%; max-width: 650px; min-height: 100vh; background: var(--card); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
.header { background: var(--primary); color: white; padding: 20px; text-align: center; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.content { padding: 20px; }
button { width: 100%; padding: 14px; margin: 5px 0; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
.blue { background: var(--primary); color:white; }
.gray { background: #e4e6eb; color:#050505; }
.dark .gray { background: #3a3b3c; color: #e4e6eb; }
input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 5px 0; box-sizing: border-box; }
.hidden { display: none; }
.word-display { font-size: 38px; font-weight: 800; margin: 30px 0; text-align: center; color: var(--primary); }
.fb-box { padding: 15px; border-radius: 12px; margin: 10px 0; display: none; text-align: center; font-weight: bold; }
.scroll-area { max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.03); padding: 10px; border-radius: 10px; margin: 10px 0; border: 1px solid #ccc; font-size: 13px; }
.word-item { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid #eee; }
.del-btn { width: auto; padding: 5px 10px; background: #ff4757; color: white; margin: 0; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div id="nav-title">📚 Fiszki Expert PRO</div>
    <button onclick="toggleTheme()" style="width:auto; padding: 5px 10px;">🌙/☀</button>
  </div>
  <div class="content">
    <div id="lobby">
      <h3>Wybierz dziedzinę:</h3>
      <div id="lang-list"></div>
      <button onclick="addNewLang()" class="gray">+ Dodaj nową dziedzinę</button>
    </div>
    <div id="menu" class="hidden">
      <button class="gray" onclick="show('lobby')">⬅ Lobby</button>
      <h2 id="menu-lang"></h2>
      <button class="blue" onclick="drawTopics()">📂 Zestawy</button>
      <button style="background:#ffc107; color:#000;" onclick="alert('Pobieranie zasad...')">❗ Ważne Info</button>
    </div>
    <div id="topics" class="hidden">
      <button class="gray" onclick="show('menu')">⬅ Menu</button>
      <div id="topics-render"></div>
      <hr>
      <input id="new-topic-in" placeholder="Nazwa nowego zestawu...">
      <button class="blue" onclick="createTopic()">➕ Stwórz zestaw</button>
    </div>
    <div id="edit" class="hidden">
      <button class="gray" onclick="drawTopics()">⬅ Powrót</button>
      <div style="display:flex; gap:5px; align-items:center;">
        <h3 id="edit-title" style="flex:1;"></h3>
        <button onclick="renameTopic()" class="gray" style="width:auto; padding:5px 10px;">✏️ Nazwa</button>
      </div>
      <div style="background:rgba(0,0,0,0.05); padding:10px; border-radius:12px; margin-bottom:10px;">
        <select id="game-count"><option value="10">10 słów</option><option value="25">25 słów</option><option value="50">50 słów</option><option value="999">Wszystkie</option></select>
        <button class="blue" onclick="startGame()">▶ START</button>
      </div>
      <input id="w-q" placeholder="Pytanie">
      <div style="display:flex; gap:5px;">
        <input id="w-a" placeholder="Odpowiedź">
        <button id="helper-btn" onclick="runHelper()" class="gray" style="width:100px; font-size:12px;">🌍 Tłumacz</button>
      </div>
      <button onclick="addWord()" class="blue">➕ Dodaj</button>
      <div id="word-list-view" class="scroll-area"></div>
    </div>
    <div id="game" class="hidden">
      <div id="fb" class="fb-box"></div>
      <div id="display-word" class="word-display"></div>
      <input id="user-input" placeholder="Wpisz odpowiedź..." autocomplete="off">
      <button id="speaker-btn" onclick="speak()" class="gray" style="margin-bottom:10px;">🔊 Słuchaj</button>
      <button id="check-btn" class="blue" onclick="handleAction()">SPRAWDŹ</button>
    </div>
    <div id="result" class="hidden">
      <h2 id="res-title">Wyniki Rundy</h2>
      <div id="final-score" style="font-size:24px; font-weight:bold; text-align:center; margin:10px 0;"></div>
      <div id="error-summary" class="scroll-area"></div>
      <button id="retry-btn" class="blue" onclick="startRetryRound()">🔄 POWTÓRZ BŁĘDNE (Runda 2)</button>
      <button class="gray" onclick="show('menu')">ZAKOŃCZ NAUKĘ</button>
    </div>
  </div>
</div>

<script>
// Baza danych została w pamięci (używam poprzedniej struktury)
const realData = {
  "Angielski": { "🍎 Owoce": [["Apple","Jabłko"],["Banana","Banan"],["Orange","Pomarańcza"],["Strawberry","Truskawka"],["Pineapple","Ananas"]], "💬 Zwroty": [["Hello","Cześć"],["Thank you","Dziękuję"],["Please","Proszę"]] },
  "Geografia": { "🌏 Azja": [["Chiny","Pekin"],["Japonia","Tokio"],["Indie","New Delhi"],["Tajlandia","Bangkok"]] },
  "Matematyka": { "√ Pierwiastki": [["√4","2"],["√9","3"],["√16","4"],["√25","5"]] }
};

let db = JSON.parse(localStorage.getItem("f_expert_v9")) || { custom: realData, langs: Object.keys(realData), theme: "light" };
let cur = { l: "", t: "", w: [], idx: 0, ok: 0, errorsToRetry: [], wait: false, round: 1 };

function save() { localStorage.setItem("f_expert_v9", JSON.stringify(db)); }
function show(id) { document.querySelectorAll('.content > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

function drawLobby() {
  const list = document.getElementById('lang-list'); list.innerHTML = '';
  db.langs.forEach(l => {
    let b = document.createElement('button'); b.className = 'blue'; b.innerText = l;
    b.onclick = () => { cur.l = l; document.getElementById('menu-lang').innerText = l; show('menu'); };
    list.appendChild(b);
  });
}

function drawTopics() {
  show('topics'); const list = document.getElementById('topics-render'); list.innerHTML = '';
  Object.keys(db.custom[cur.l] || {}).forEach(t => {
    let b = document.createElement('button'); b.innerText = `${t} (${db.custom[cur.l][t].length})`;
    b.onclick = () => { cur.t = t; openEdit(); }; list.appendChild(b);
  });
}

function openEdit() {
  show('edit'); document.getElementById('edit-title').innerText = cur.t;
  const v = document.getElementById('word-list-view');
  v.innerHTML = db.custom[cur.l][cur.t].map((w, i) => `<div class="word-item"><span>${w[0]} = ${w[1]}</span><button class="del-btn" onclick="deleteWord(${i})">Usuń</button></div>`).join('');
}

function deleteWord(idx) { db.custom[cur.l][cur.t].splice(idx, 1); save(); openEdit(); }
function addWord() {
  let q = document.getElementById('w-q').value, a = document.getElementById('w-a').value;
  if(!q || !a) return; db.custom[cur.l][cur.t].push([q, a]);
  save(); openEdit(); document.getElementById('w-q').value = ''; document.getElementById('w-a').value = '';
}

// --- LOGIKA GRY Z POWTÓRKAMI ---
function startGame() {
  let all = db.custom[cur.l][cur.t]; if(!all.length) return;
  let c = parseInt(document.getElementById('game-count').value);
  cur.w = [...all].sort(() => 0.5 - Math.random()).slice(0, c);
  cur.round = 1; startRoundLogic();
}

function startRetryRound() {
  cur.w = [...cur.errorsToRetry];
  cur.round++;
  startRoundLogic();
}

function startRoundLogic() {
  cur.idx = 0; cur.ok = 0; cur.errorsToRetry = [];
  show('game'); nextW();
}

function nextW() {
  cur.wait = false; document.getElementById('fb').style.display = 'none';
  if(cur.idx >= cur.w.length) return fin();
  document.getElementById('display-word').innerText = cur.w[cur.idx][0];
  document.getElementById('user-input').value = ''; document.getElementById('user-input').focus();
}

function handleAction() {
  if(cur.wait) { cur.idx++; nextW(); return; }
  let user = document.getElementById('user-input').value.trim().toLowerCase();
  let correct = cur.w[cur.idx][1].toLowerCase();
  let f = document.getElementById('fb'); f.style.display = 'block'; cur.wait = true;
  
  if(user === correct || (user.length > 3 && correct.includes(user))) {
    f.innerText = "Dobrze! ✔"; f.style.background = "var(--good)"; cur.ok++;
  } else {
    f.innerHTML = `Błąd! Poprawnie: <b>${cur.w[cur.idx][1]}</b>`; f.style.background = "var(--bad)";
    cur.errorsToRetry.push(cur.w[cur.idx]); // Dodaj do powtórki
  }
}

function fin() {
  show('result');
  document.getElementById('res-title').innerText = `Wynik Rundy ${cur.round}`;
  document.getElementById('final-score').innerText = `${cur.ok} / ${cur.w.length}`;
  
  const summary = document.getElementById('error-summary');
  if(cur.errorsToRetry.length > 0) {
    summary.innerHTML = "<h4>Błędy do poprawy:</h4><table>" + 
      cur.errorsToRetry.map(e => `<tr><td>${e[0]}</td><td><b>${e[1]}</b></td></tr>`).join('') + "</table>";
    document.getElementById('retry-btn').classList.remove('hidden');
    document.getElementById('retry-btn').innerText = `🔄 POWTÓRZ BŁĘDNE (Runda ${cur.round + 1})`;
  } else {
    summary.innerHTML = "<p style='color:green; font-weight:bold;'>Perfekcyjnie! Wszystko opanowane! 🏆</p>";
    document.getElementById('retry-btn').classList.add('hidden');
  }
}

function speak() {
  window.speechSynthesis.speak(new SpeechSynthesisUtterance(cur.w[cur.idx][0]));
}

function toggleTheme() { document.body.classList.toggle("dark"); db.theme = document.body.classList.contains("dark") ? "dark" : "light"; save(); }
drawLobby();
</script>
</body>
</html>
